on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: codeberg-small
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            gcc libtls-dev pkg-config autoconf automake make
      - name: Build
        run: |
          autoreconf -fi
          ./configure
          make
      - name: Test
        run: make check
      - name: Prepare artifact
        run: |
          strip src/cb
          mkdir -p cb-linux-amd64
          cp src/cb cb-linux-amd64/cb
          cp COPYING cb-linux-amd64/COPYING
          cp README.md cb-linux-amd64/README.md
          tar czf cb-linux-amd64.tar.gz cb-linux-amd64
          make dist
          DIST=$(ls cb-*.tar.gz | grep -v linux | head -1)
          mv "$DIST" cb-source-dist.tar.gz
      - uses: https://code.forgejo.org/actions/upload-artifact@v3
        with:
          name: cb-linux-amd64
          path: cb-linux-amd64.tar.gz
      - uses: https://code.forgejo.org/actions/upload-artifact@v3
        with:
          name: cb-source-dist
          path: cb-source-dist.tar.gz

  build-windows:
    runs-on: codeberg-small
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            mingw-w64 pkg-config autoconf automake make \
            wget ca-certificates zstd zip
      - name: Extract pre-built LibreSSL from MSYS2
        run: |
          mkdir -p /usr/x86_64-w64-mingw32
          cd /tmp
          wget -q https://mirror.msys2.org/mingw/mingw64/mingw-w64-x86_64-libressl-4.3.2-1-any.pkg.tar.zst
          zstd -d mingw-w64-x86_64-libressl-4.3.2-1-any.pkg.tar.zst -o libressl.tar
          tar xf libressl.tar
          cp -r mingw64/include/* /usr/x86_64-w64-mingw32/include/
          cp -r mingw64/lib/* /usr/x86_64-w64-mingw32/lib/
      - name: Build cb for Windows
        run: |
          autoreconf -fi
          ./configure \
            --host=x86_64-w64-mingw32 \
            PKG_CONFIG_PATH=/usr/x86_64-w64-mingw32/lib/libressl/pkgconfig \
            LIBTLS_CFLAGS="-I/usr/x86_64-w64-mingw32/include/libressl" \
            LIBTLS_LIBS="-L/usr/x86_64-w64-mingw32/lib/libressl -ltls -lssl -lcrypto -lws2_32"
          make
      - name: Prepare artifact
        run: |
          x86_64-w64-mingw32-strip src/cb.exe
          cp src/cb.exe cb-windows-amd64.exe
          cp /tmp/mingw64/bin/libretls-33.dll .
          cp /tmp/mingw64/bin/libressl-60.dll .
          cp /tmp/mingw64/bin/librecrypto-57.dll .
          zip cb-windows-amd64.zip \
            cb-windows-amd64.exe \
            libretls-33.dll \
            libressl-60.dll \
            librecrypto-57.dll \
            COPYING \
            README.md
      - uses: https://code.forgejo.org/actions/upload-artifact@v3
        with:
          name: cb-windows-amd64
          path: cb-windows-amd64.zip

  build-macos:
    runs-on: codeberg-small
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            wget ca-certificates xz-utils curl make
      - name: Install zig
        run: |
          curl -L https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz -o zig.tar.xz
          tar xJf zig.tar.xz
          echo "$PWD/zig-linux-x86_64-0.13.0" >> $GITHUB_PATH
      - name: Cross-compile LibreSSL for macOS
        run: |
          wget -q https://ftp.openbsd.org/pub/OpenBSD/LibreSSL/libressl-4.3.2.tar.gz
          tar xzf libressl-4.3.2.tar.gz
          cd libressl-4.3.2
          CC="zig cc -target x86_64-macos" \
          AR="zig ar" \
          RANLIB="zig ranlib" \
          ./configure --host=x86_64-apple-darwin \
            --prefix=/tmp/libressl-macos --enable-libtls-only \
            --disable-shared --enable-static --disable-tests --disable-asm
          make -j4
          make install
      - name: Build cb for macOS
        run: |
          autoreconf -fi
          CC="zig cc -target x86_64-macos" ./configure --host=x86_64-apple-darwin \
            LIBTLS_CFLAGS="-I/tmp/libressl-macos/include" \
            LIBTLS_LIBS="-L/tmp/libressl-macos/lib -ltls" \
            --disable-werror
          make
      - name: Prepare artifact
        run: |
          mkdir -p cb-darwin-amd64
          cp src/cb cb-darwin-amd64/cb
          cp COPYING cb-darwin-amd64/COPYING
          cp README.md cb-darwin-amd64/README.md
          tar czf cb-darwin-amd64.tar.gz cb-darwin-amd64
      - uses: https://code.forgejo.org/actions/upload-artifact@v3
        with:
          name: cb-darwin-amd64
          path: cb-darwin-amd64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: codeberg-tiny
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://code.forgejo.org/actions/download-artifact@v3
        with:
          name: cb-linux-amd64
          path: release
      - uses: https://code.forgejo.org/actions/download-artifact@v3
        with:
          name: cb-windows-amd64
          path: release
      - uses: https://code.forgejo.org/actions/download-artifact@v3
        with:
          name: cb-darwin-amd64
          path: release
      - uses: https://code.forgejo.org/actions/download-artifact@v3
        with:
          name: cb-source-dist
          path: release
      - name: Rename artifacts and generate checksums
        run: |
          cd release
          V=${{ github.ref_name }}
          mv cb-linux-amd64.tar.gz cb-${V}-linux-amd64.tar.gz
          mv cb-windows-amd64.zip cb-${V}-windows-amd64.zip
          mv cb-darwin-amd64.tar.gz cb-${V}-darwin-amd64.tar.gz
          mv cb-source-dist.tar.gz cb-${V}-source.tar.gz
          sha256sum cb-${V}-linux-amd64.tar.gz > cb-${V}-linux-amd64.tar.gz.sha256
          sha256sum cb-${V}-windows-amd64.zip > cb-${V}-windows-amd64.zip.sha256
          sha256sum cb-${V}-darwin-amd64.tar.gz > cb-${V}-darwin-amd64.tar.gz.sha256
          sha256sum cb-${V}-source.tar.gz > cb-${V}-source.tar.gz.sha256
      - uses: https://code.forgejo.org/actions/forgejo-release@v2.13.1
        with:
          direction: upload
          url: https://codeberg.org
          tag: ${{ github.ref_name }}
          release-dir: release
          token: ${{ secrets.GITHUB_TOKEN }}
