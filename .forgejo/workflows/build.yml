on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: codeberg-small
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            gcc libtls-dev pkg-config autoconf automake make
      - name: Build
        run: |
          autoreconf -fi
          ./configure
          make
      - name: Test
        run: make check
      - name: Prepare artifact
        run: |
          strip src/cb
          cp src/cb cb-linux-amd64
      - uses: https://code.forgejo.org/actions/upload-artifact@v3
        with:
          name: cb-linux-amd64
          path: cb-linux-amd64

  build-windows:
    runs-on: codeberg-small
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            mingw-w64 pkg-config autoconf automake make \
            wget ca-certificates
      - name: Build LibreSSL for Windows
        run: |
          cd /tmp
          wget https://ftp.openbsd.org/pub/OpenBSD/LibreSSL/libressl-4.3.2.tar.gz
          tar xzf libressl-4.3.2.tar.gz
          cd libressl-4.3.2
          ./configure \
            --host=x86_64-w64-mingw32 \
            --prefix=/usr/x86_64-w64-mingw32 \
            --disable-shared --enable-static \
            --enable-libtls
          make -j$(nproc)
          make install
      - name: Build cb for Windows
        run: |
          autoreconf -fi
          ./configure \
            --host=x86_64-w64-mingw32 \
            PKG_CONFIG_PATH=/usr/x86_64-w64-mingw32/lib/pkgconfig \
            LIBTLS_CFLAGS="-I/usr/x86_64-w64-mingw32/include" \
            LIBTLS_LIBS="-L/usr/x86_64-w64-mingw32/lib -ltls -lssl -lcrypto -lws2_32"
          make
      - name: Prepare artifact
        run: |
          x86_64-w64-mingw32-strip src/cb.exe
          cp src/cb.exe cb-windows-amd64.exe
      - uses: https://code.forgejo.org/actions/upload-artifact@v3
        with:
          name: cb-windows-amd64
          path: cb-windows-amd64.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: codeberg-tiny
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://code.forgejo.org/actions/download-artifact@v3
        with:
          name: cb-linux-amd64
          path: release
      - uses: https://code.forgejo.org/actions/download-artifact@v3
        with:
          name: cb-windows-amd64
          path: release
      - name: Generate checksums
        run: |
          cd release
          sha256sum cb-linux-amd64 > cb-linux-amd64.sha256
          sha256sum cb-windows-amd64.exe > cb-windows-amd64.exe.sha256
      - uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          direction: upload
          url: https://codeberg.org
          tag: ${{ github.ref_name }}
          release-dir: release
          token: ${{ secrets.GITHUB_TOKEN }}
          override: true
